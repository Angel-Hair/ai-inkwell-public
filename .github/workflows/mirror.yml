name: Mirror to Public

on:
  push:
    branches: [main]

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 用脱敏版本替换原始报告
        run: |
          for dir in reports/*/; do
            for f in "$dir"*-sanitized.html; do
              [ -f "$f" ] || continue
              original="${f%-sanitized.html}.html"
              if [ -f "$original" ]; then
                cp "$f" "$original"
                rm "$f"
              fi
            done
            for f in "$dir"*-sanitized.md; do
              [ -f "$f" ] || continue
              original="${f%-sanitized.md}.md"
              if [ -f "$original" ]; then
                cp "$f" "$original"
                rm "$f"
              fi
            done
          done

      - name: 移除私有文件和临时目录
        run: |
          rm -rf sources/ tmp/

      - name: 推送公开镜像
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -A
          git diff --cached --quiet || git commit -m "mirror: sync sanitized content"
          git push --force https://x-access-token:${{ secrets.PUBLIC_REPO_TOKEN }}@github.com/Angel-Hair/ai-inkwell-public.git main
